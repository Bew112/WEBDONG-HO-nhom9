{% extends 'shop/base.html' %}

{% block title %}Đăng Nhập - WatchShop{% endblock %}

{% block content %}
<div class="container">
    <div style="max-width: 400px; margin: 3rem auto;">
        <div style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <h2 style="text-align: center; color: var(--primary); margin-bottom: 2rem;">🔐 Đăng Nhập</h2>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Tên Đăng Nhập</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật Khẩu</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-success" style="width: 100%; padding: 0.75rem;">Đăng Nhập</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem;">
                Chưa có tài khoản? <a href="{% url 'register' %}" style="color: var(--secondary); font-weight: bold;">Đăng Ký Ngay</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
